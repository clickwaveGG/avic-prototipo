<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Codex - O conhecimento que cura">
  <title>Codex - O conhecimento que cura</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F9F8"/>
      <stop offset="100%" stop-color="#E6F5F0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circle accent -->
  <circle cx="1080" cy="120" r="160" fill="#0B7A65" opacity="0.06"/>
  <circle cx="120" cy="540" r="200" fill="#C4982A" opacity="0.05"/>

  <!-- Symbol -->
  <g transform="translate(120 180) scale(3)">
    <g fill="none" stroke="#0B5A4A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 14 L16 50" />
      <path d="M48 16 C 28 16, 18 26, 18 32 C 18 38, 28 48, 48 48" />
    </g>
    <circle cx="32" cy="32" r="3.2" fill="#C4982A" />
  </g>

  <!-- Wordmark -->
  <text x="360" y="280"
    font-family="'Playfair Display', 'Cormorant Garamond', Georgia, serif"
    font-weight="700"
    font-size="140"
    letter-spacing="-3"
    fill="#0F1A14">Codex</text>

  <!-- Tagline -->
  <text x="120" y="430"
    font-family="'Playfair Display', Georgia, serif"
    font-style="italic"
    font-size="44"
    fill="#0B7A65">O conhecimento que cura.</text>

  <!-- Subline -->
  <text x="120" y="490"
    font-family="'Inter', system-ui, sans-serif"
    font-weight="400"
    font-size="28"
    fill="#5A6B62">Assistente de estudos em PDF para estudantes de saude.</text>

  <!-- Footer chip -->
  <rect x="120" y="540" width="380" height="44" rx="22" fill="#0B7A65"/>
  <text x="142" y="570"
    font-family="'Inter', system-ui, sans-serif"
    font-weight="600"
    font-size="18"
    fill="#FFFFFF">Medicina · Enfermagem · Biomedicina · +</text>
</svg>
